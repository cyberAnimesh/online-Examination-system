{% extends 'base.html' %}
{% block content %}
<main class="teacher-page">
    <div class="container">
        <div class="teacher-header" style="margin-bottom: 24px;">
            <div>
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline btn-sm" style="margin-bottom: 12px; display: inline-flex;">
                    <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to Dashboard
                </a>
                <h1>Edit Exam: {{ exam.name }}</h1>
            </div>
        </div>

        <section class="teacher-panel">
            <form class="teacher-form" action="{% url 'edit_exam' exam.uid %}" method="POST">
                {% csrf_token %}
                <div class="form-grid">
                    <div class="form-group">
                        <label for="exam-name">Exam Name</label>
                        <input id="exam-name" type="text" name="name" value="{{ exam.name }}" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            {% for category in categories %}
                            <option value="{{ category.id }}" {% if category.id == exam.category.id %}selected{% endif %}>{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category-name">New Category (Optional)</label>
                        <input id="category-name" type="text" name="category_name" placeholder="Or create new">
                    </div>
                    <div class="form-group">
                        <label for="time-limit">Time Limit (minutes)</label>
                        <input id="time-limit" type="number" name="time_limit_minutes" value="{{ exam.time_limit_minutes }}" min="0">
                    </div>
                    <div class="form-group">
                        <label for="max-questions">Max Questions Shown</label>
                        <input id="max-questions" type="number" name="max_questions" value="{{ exam.max_questions }}" min="0">
                    </div>
                </div>

                <div class="feature-toggles">
                    <h3>
                        <i data-lucide="settings" style="width:16px;height:16px;color:var(--primary);"></i>
                        Feature Settings
                    </h3>
                    <div class="toggle-grid">
                        <label class="toggle-item">
                            <input type="checkbox" name="proctoring_enabled" {% if exam.proctoring_enabled %}checked{% endif %}>
                            <span class="toggle-label-text">
                                <i data-lucide="eye" style="width:16px;height:16px;"></i>
                                AI Proctoring
                            </span>
                            <span class="toggle-desc">Tab-switch & behavior monitoring</span>
                        </label>
                        <label class="toggle-item">
                            <input type="checkbox" name="browser_lockdown" {% if exam.browser_lockdown %}checked{% endif %}>
                            <span class="toggle-label-text">
                                <i data-lucide="shield-check" style="width:16px;height:16px;"></i>
                                Browser Lockdown
                            </span>
                            <span class="toggle-desc">Fullscreen & copy/paste block</span>
                        </label>
                        <label class="toggle-item">
                            <input type="checkbox" name="shuffle_questions" {% if exam.shuffle_questions %}checked{% endif %}>
                            <span class="toggle-label-text">
                                <i data-lucide="shuffle" style="width:16px;height:16px;"></i>
                                Shuffle Questions
                            </span>
                            <span class="toggle-desc">Randomize question order</span>
                        </label>
                    </div>

                    <div class="form-grid" style="margin-top:12px;">
                        <div class="form-group">
                            <label for="lms-platform">
                                <i data-lucide="plug" style="width:14px;height:14px;"></i>
                                LMS Platform
                            </label>
                            <select id="lms-platform" name="lms_platform">
                                <option value="none" {% if exam.lms_platform == 'none' %}selected{% endif %}>None</option>
                                <option value="moodle" {% if exam.lms_platform == 'moodle' %}selected{% endif %}>Moodle</option>
                                <option value="canvas" {% if exam.lms_platform == 'canvas' %}selected{% endif %}>Canvas</option>
                                <option value="blackboard" {% if exam.lms_platform == 'blackboard' %}selected{% endif %}>Blackboard</option>
                                <option value="google_classroom" {% if exam.lms_platform == 'google_classroom' %}selected{% endif %}>Google Classroom</option>
                                <option value="teams" {% if exam.lms_platform == 'teams' %}selected{% endif %}>Microsoft Teams</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="lms-course-id">LMS Course ID</label>
                            <input id="lms-course-id" type="text" name="lms_course_id" value="{{ exam.lms_course_id }}">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i data-lucide="save" style="width:18px;height:18px;"></i>
                    Save Changes
                </button>
            </form>
        </section>
    </div>
</main>
{% endblock %}
