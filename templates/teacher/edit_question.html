{% extends 'base.html' %}
{% block content %}
<main class="teacher-page">
    <div class="container">
        <div class="teacher-header" style="margin-bottom: 24px;">
            <div>
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline btn-sm" style="margin-bottom: 12px; display: inline-flex;">
                    <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to Dashboard
                </a>
                <h1>Edit Question</h1>
            </div>
        </div>

        <section class="teacher-panel">
            <form class="question-form" action="{% url 'edit_question' question.uid %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Question Text</label>
                    <textarea name="question" rows="4" required>{{ question.question }}</textarea>
                </div>
                <div class="form-grid compact">
                    <div class="form-group">
                        <label>Marks</label>
                        <input type="number" name="marks" value="{{ question.marks }}" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Correct Option</label>
                        <select name="correct_answer" required>
                            {% for ans in answers %}
                                <option value="{{ forloop.counter }}" {% if ans.is_correct %}selected{% endif %}>Option {{ forloop.counter }}</option>
                            {% endfor %}
                            {% if answers|length < 4 %}
                                <!-- Fallbacks in case question has fewer than 4 answers -->
                                <option value="4">Option 4</option>
                            {% endif %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Difficulty</label>
                        <select name="difficulty">
                            <option value="easy" {% if question.difficulty == 'easy' %}selected{% endif %}>Easy</option>
                            <option value="medium" {% if question.difficulty == 'medium' %}selected{% endif %}>Medium</option>
                            <option value="hard" {% if question.difficulty == 'hard' %}selected{% endif %}>Hard</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <input type="text" name="tags" value="{{ question.tags }}">
                    </div>
                </div>
                <div class="form-grid two">
                    {% for ans in answers %}
                        <div class="form-group">
                            <label>Option {{ forloop.counter }}</label>
                            <input type="text" name="answer_{{ forloop.counter }}" value="{{ ans.answer }}" required>
                        </div>
                    {% endfor %}
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 16px;">
                    <i data-lucide="save" style="width:18px;height:18px;"></i>
                    Save Question
                </button>
            </form>
        </section>
    </div>
</main>
{% endblock %}
